      lines.forEach((lineText, lineIndex) => {
        let totalWidth = 0;
        // Calculate line width first
        lineText.split('').forEach(letter => {
          if (letter === ' ') {
            totalWidth += size * 0.5;
            return;
          }
          const geometry = new TextGeometry(letter, {
            font: font, size, height, curveSegments, bevelEnabled, bevelThickness, bevelSize, bevelOffset, bevelSegments
          });
          geometry.computeBoundingBox();
          totalWidth += (geometry.boundingBox.max.x - geometry.boundingBox.min.x) + (size * 0.1);
        });

        let xOffset = -totalWidth / 2;
        const yPos = yStart - (lineIndex * lineHeight);

        lineText.split('').forEach((letter) => {
          if (letter === ' ') {
            xOffset += size * 0.5;
            return;
          }

          const geometry = new TextGeometry(letter, {
            font: font, size, height, curveSegments, bevelEnabled, bevelThickness, bevelSize, bevelOffset, bevelSegments
          });

          geometry.computeBoundingBox();
          const width = geometry.boundingBox.max.x - geometry.boundingBox.min.x;
          geometry.translate(-width / 2, 0, 0);

          const mesh = new THREE.Mesh(geometry, kineticMaterial.clone());
          const edges = new THREE.EdgesGeometry(geometry);
          const line = new THREE.LineSegments(edges, new THREE.LineBasicMaterial({ color: CONFIG.glowColor, transparent: true, opacity: 0.3 }));
          mesh.add(line);

          mesh.position.set(xOffset + width / 2, yPos, 0);

          // Store initial position for GSAP
          mesh.userData.initialX = xOffset + width / 2;
          mesh.userData.initialY = yPos;
          mesh.userData.initialZ = 0;

          textGroup.add(mesh);
          letterMeshes.push(mesh);

          xOffset += width + (size * 0.1);
        });
      });

      // --- Subtitle Generation ---
      const subMessage = CONFIG.subtitle;
      // Subtitle smaller size
      const subSize = size * 0.4;
      // Calculate Y position relative to main text (approximate)
      const subYPos = yStart - (lines.length * lineHeight) - (isMobile ? 1.0 : 0.5);

      let subTotalWidth = 0;
      subMessage.split('').forEach(letter => {
        if (letter === ' ') { subTotalWidth += subSize * 0.5; return; }
        const geo = new TextGeometry(letter, { font, size: subSize, height: 0.1, curveSegments: 4, bevelEnabled: true, bevelThickness: 0.01, bevelSize: 0.005, bevelOffset: 0, bevelSegments: 3 });
        geo.computeBoundingBox();
        subTotalWidth += (geo.boundingBox.max.x - geo.boundingBox.min.x) + (subSize * 0.1);
      });

      let subXOffset = -subTotalWidth / 2;

      subMessage.split('').forEach(letter => {
        if (letter === ' ') { subXOffset += subSize * 0.5; return; }

        const geometry = new TextGeometry(letter, {
          font, size: subSize, height: 0.1, curveSegments: 4, bevelEnabled: true, bevelThickness: 0.01, bevelSize: 0.005, bevelOffset: 0, bevelSegments: 3
        });
        geometry.computeBoundingBox();
        const width = geometry.boundingBox.max.x - geometry.boundingBox.min.x;
        geometry.translate(-width / 2, 0, 0);

        const mesh = new THREE.Mesh(geometry, kineticMaterial.clone());
        // Removed white override to match main title

        const edges = new THREE.EdgesGeometry(geometry);
        const line = new THREE.LineSegments(edges, new THREE.LineBasicMaterial({ color: CONFIG.glowColor, transparent: true, opacity: 0.3 }));
        mesh.add(line);

        mesh.position.set(subXOffset + width / 2, subYPos, 0);

        textGroup.add(mesh);
        letterMeshes.push(mesh);
        mesh.userData.isSubtitle = true;

        subXOffset += width + (subSize * 0.1);
      });

      initAnimation();

    },
      (xhr) => {
        if (xhr.lengthComputable) {
          const percent = Math.round((xhr.loaded / xhr.total) * 100);
          document.getElementById('progress').innerText = percent + '%';
          document.getElementById('progress-bar').style.width = percent + '%';
        }
      });

    // --- Post Processing ---
    const composer = new EffectComposer(renderer);

    const renderPass = new RenderPass(scene, camera);
    composer.addPass(renderPass);

    const bloomPass = new UnrealBloomPass(new THREE.Vector2(window.innerWidth, window.innerHeight), 1.0, 0.4, 0.85);
    bloomPass.threshold = 0.2;
    bloomPass.strength = 0.4;
    bloomPass.radius = 0.5;
    composer.addPass(bloomPass);

    const filmPass = new FilmPass(
      0.15,
      0.025,
      648,
      false
    );
    composer.addPass(filmPass);

    // --- Animation Logic ---
    window.addEventListener('mousemove', (e) => {
      mouse.x = (e.clientX / window.innerWidth) * 2 - 1;
      mouse.y = -(e.clientY / window.innerHeight) * 2 + 1;
    });

    const clock = new THREE.Clock();

    function animate() {
      requestAnimationFrame(animate);

      const time = clock.getElapsedTime();

      raycaster.setFromCamera(mouse, camera);
      const intersect = new THREE.Vector3();
      raycaster.ray.intersectPlane(plane, intersect);
      mouseWorld.copy(intersect);

      letterMeshes.forEach((mesh, i) => {
        if (mesh.material.uniforms) {
          mesh.material.uniforms.uTime.value = time;
          mesh.material.uniforms.uMouse.value = mouseWorld;
        }

        const dist = mesh.position.distanceTo(mouseWorld);
        if (dist < 8) {
          const targetRotationY = (mouseWorld.x - mesh.position.x) * 0.1;
          const targetRotationX = -(mouseWorld.y - mesh.position.y) * 0.1;

          mesh.rotation.y += (targetRotationY - mesh.rotation.y) * 0.05;
          mesh.rotation.x += (targetRotationX - mesh.rotation.x) * 0.05;
        } else {
          mesh.rotation.y += (0 - mesh.rotation.y) * 0.05;
          mesh.rotation.x += (0 - mesh.rotation.x) * 0.05;
        }
      });

      camera.position.x = Math.sin(time * 0.1) * 0.5;
      camera.position.y = Math.cos(time * 0.2) * 0.5;
      camera.lookAt(0, 0, 0);

      composer.render();
    }

    function initAnimation() {
      const loaderEl = document.getElementById('loader');
      loaderEl.style.opacity = '0';
      setTimeout(() => loaderEl.style.display = 'none', 1000);

      const tl = gsap.timeline();

      const mainMeshes = letterMeshes.filter(m => !m.userData.isSubtitle);
      const subMeshes = letterMeshes.filter(m => m.userData.isSubtitle);

      // Main Title Animation
      tl.from(mainMeshes.map(m => m.position), {
        z: -50,
        y: (i) => (Math.random() - 0.5) * 50,
        x: (i) => (Math.random() - 0.5) * 50,
        rotationX: Math.PI * 2,
        rotationY: Math.PI * 2,
        duration: 3.5,
        stagger: {
          amount: 1.5,
          from: "random"
        },
        ease: "elastic.out(1, 0.3)"
      });

      // Subtitle Animation (Sync with main title)
      if (subMeshes.length > 0) {
        tl.from(subMeshes.map(m => m.position), {
          z: -20,
          y: (i) => (Math.random() - 0.5) * 20,
          x: (i) => (Math.random() - 0.5) * 20,
          rotationX: Math.PI,
          duration: 3.5, // Match duration
          stagger: {
            amount: 1.5, // Match stagger
            from: "random"
          },
          ease: "elastic.out(1, 0.3)" // Match easing
        }, "<"); // Start at the same time as previous animation
      }

      animate();
    }



    window.addEventListener('resize', () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
      composer.setSize(window.innerWidth, window.innerHeight);
    });

    const observer = new IntersectionObserver((entries) => {
      entries.forEach(entry => {
        if (!entry.isIntersecting) {
          clock.stop();
        } else {
          clock.start();
        }
      });
    });
    observer.observe(canvas);

  </script>
</body>
